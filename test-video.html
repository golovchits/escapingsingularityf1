<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Video Test</title></head>
<body style="margin:0;background:#000;">
<video id="v" src="images/hero-bg.mp4" autoplay muted loop playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;"></video>
<script>(function(){var v=document.getElementById('v');if(!v)return;v.play().catch(function(){var e=['mousemove','touchstart','scroll','click'];function p(){v.play();e.forEach(function(n){document.removeEventListener(n,p);});}e.forEach(function(n){document.addEventListener(n,p,{once:true});});});})();</script>
</body>
</html>
